templates:
  - scc.yaml
  - scc-clusterrole.yaml
  - scc-rolebinding.yaml
chart:
  appVersion: v0.0.0
capabilities:
  majorVersion: 1
  minorVersion: 30
tests:
  - it: not rendering on kubernetes
    asserts:
      - hasDocuments:
          count: 0
  - it: forced rendering on kubernetes
    set:
      securityContextConstraint:
        create: true
        name: "my-scc"
    asserts:
      - matchSnapshot: {}
  - it: rendering by default on openshift
    capabilities:
      apiVersions:
        - "security.openshift.io/v1/SecurityContextConstraints"
    asserts:
      - matchSnapshot: {}
  - it: suppressed on openshift
    capabilities:
      apiVersions:
        - "security.openshift.io/v1/SecurityContextConstraints"
    set:
      securityContextConstraint:
        create: false
    asserts:
      - hasDocuments:
          count: 0
  - it: grants SYS_RESOURCE when oomScoreAdj is enabled on openshift
    capabilities:
      apiVersions:
        - "security.openshift.io/v1/SecurityContextConstraints"
    set:
      agent:
        oomScoreAdj:
          enabled: true
    asserts:
      - template: scc.yaml
        equal:
          path: allowPrivilegeEscalation
          value: true
      - template: scc.yaml
        contains:
          path: allowedCapabilities
          content: SYS_RESOURCE
      - template: scc.yaml
        contains:
          path: requiredDropCapabilities
          content: ALL
  - it: does not grant SYS_RESOURCE by default on openshift
    capabilities:
      apiVersions:
        - "security.openshift.io/v1/SecurityContextConstraints"
    asserts:
      - template: scc.yaml
        notExists:
          path: allowedCapabilities
