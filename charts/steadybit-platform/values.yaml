# Default values for steadybit-platform.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
global:
  image:
    # global.image.registry -- The container registry to use for all platform images. Can be overridden per image by including a registry in image.name.
    registry: docker.steadybit.io

platform:
  # platform.name -- Used to identify the platform when running multiple installations (e.g. in a multi-stage setup). Should be omitted when using a single installation.
  name: null
  tenant:
    mode: "ONPREM"
    # platform.tenant.key -- Name for the tenant assigned to you.
    key: onprem
    # platform.tenant.name -- Key for the tenant assigned to you.
    name: onprem
    # platform.tenant.agentKey -- The secret token which your agent uses to authenticate to steadybit's servers.  Get it from https://platform.steadybit.io/settings/agents/setup.
    agentKey: null
    # platform.tenant.license -- The license to run the platform. This is mandatory for platform >= 2.2.0
    license: null
    agent:
      auth:
        # platform.tenant.agent.auth.provider -- Default is `agent-key`. Use `oauth2` if you like to use oauth2 authenication
        provider: agent-key
        oauth2:
          issuerUri: null
  # platform.uiPort -- (internal) Web-UI port for the user interface.
  uiPort: 80
  # platform.publicWebUrl -- The url where users can access the platform via browser. For example in our SaaS: https://platform.steadybit.com
  publicWebUrl: null
  # platform.websocketPort -- (internal) Websocket port for communication between platform and agents.
  websocketPort: 7878
  # platform.publicWebsocketPort -- The public port used for experiments - Use this if the agent access the websocket via ingress or a reverse proxy, that serves websocket and http traffic using the same port
  publicWebsocketPort: 80
  # platform.ingressOrigin -- Should be set to the ingress origin, e.g., https://ingress.steadybit.example.com. Will be used to construct URLs in HTTP responses to agents. This configuration will overwrite the port defined in platform.publicWebsocketPort
  ingressOrigin: null
  # -- Use this to set additional environment variables See https://docs.steadybit.com/install-and-configure/install-on-prem-platform/advanced-configuration
  envFrom: []
  env:
    - name: STEADYBIT_AUTH_PROVIDER
      value: "static"
    - name: STEADYBIT_AUTH_STATIC_0_USERNAME
      value: "admin"
    - name: STEADYBIT_AUTH_STATIC_0_PASSWORD
      value: "{noop}admin"
  # platform.extraLabels -- Additional labels
  extraLabels: {}
  # platform.extraVolumes -- Additional volumes to which the platform container will be mounted.
  extraVolumes: []
  # platform.extraVolumeMounts -- Additional volumeMounts to which the platform container will be mounted.
  extraVolumeMounts: []
  logging:
    format: text
  service:
    ## platform.service.type -- DEPRECATED please use service.type
    type: null
  portSplit:
    # platform.portSplit.enabled -- Can be set to "true" to change the service and ingress definition in such a way that the ports are split by purpose, i.e., an ingress and a separate egress port. This comes in handy when hardening deployments / to improve package routing.
    enabled: false
  replicas: 1
  rolloutStrategy: Recreate
  minReadySeconds: 60
  maxUnavailable: 0
  maxSurge: 2
  # platform.prometheus.scrape -- Controls the `prometheus.io/scrape` pod annotation which controls whether Prometheus will automatically scrape metrics from platform pods.
  prometheus:
    scrape: true
  database:
    migration:
      # platform.database.migration.useInitContainer -- Should database migration be executed in an init container? Enabled by default. When disabled, the migration runs in the main container during startup, so you should increase `platform.startupProbe.initialDelaySeconds` and `platform.startupProbe.failureThreshold` again to allow enough time for the migration to complete.
      useInitContainer: true
  uiImages:
    # platform.uiImages.cspDomains -- Additional domains to add to the Content-Security-Policy header for loading images
    cspDomains: []
    navigation:
      # platform.uiImages.navigation.url -- URL to a custom navigation image; takes preference over data
      url: null
      # platform.uiImages.navigation.data -- content of a custom navigation image. Must not exceed 1MiB;  Will be converted to a data url; use with --set-file
      data: null
      # platform.uiImages.navigation.mediatype -- media-type for the content of a custom navigation image
      mediaType: null
    navigationLogo:
      # platform.uiImages.navigationLogo.url -- URL to a custom navigation logo image; takes preference over data
      url: null
      # platform.uiImages.navigationLogo.data -- content of a custom navigation logo image;  Must not exceed 1MiB;  Will be converted to a data url; use with --set-file
      data: null
      # platform.uiImages.navigationLogo.mediatype -- media-type for the content of the custom navigation logo image
      mediaType: null
    loadingScreen:
      # platform.uiImages.loadingScreen.url -- URL to a custom loading screen image; takes preference over data
      url: null
      # platform.uiImages.loadingScreen.data -- content of a custom loading screen image; Must not exceed 1MiB;  Will be converted to a data url; use with --set-file
      data: null
      # platform.uiImages.loadingScreen.mediatype -- media-type of the custom navigation image
      mediaType: null

  ## platform.readinessProbe.* -- Configuration of the Kubernetes readinessProbe probe for the platform deployment
  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1

  ## platform.startupProbe.* -- Configuration of the Kubernetes startup probe for the platform deployment. The defaults assume the database migration runs in an init container (`platform.database.migration.useInitContainer`). When that is disabled, increase `initialDelaySeconds` and `failureThreshold` to allow enough time for the migration to complete during startup.
  startupProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 12
    successThreshold: 1

  ## platform.livenessProbe.* -- Configuration of the Kubernetes liveness probe for the platform deployment
  livenessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5
    successThreshold: 1

  ## platform.proxy.* -- Proxy configuration used for outgoing http calls of the platform
  proxy:
    host: null
    port: null
    protocol: HTTP
    user: null
    password: null
  ## platform.terminationGracePeriodSeconds -- The time in seconds to wait for the platform to gracefully terminate and complete running experiments before it is forcefully terminated.
  terminationGracePeriodSeconds: 0  # default is 0, that means no grace period and all experiments are canceled immediately during shutdown.
  ## The interval in seconds to check for experiment executions during shutdown
  experimentExecutionShutdownCheckInterval: 10
  ## platform.lifecycle -- Container lifecycle hooks for the platform container.
  ## On Kubernetes < 1.29 the native `sleep` preStop handler is not available and
  ## is automatically rendered as an `exec` ["sleep", "<seconds>"] handler instead.
  lifecycle:
    preStop:
      sleep:
        seconds: 20
  portsplitter:
    ## platform.portsplitter.lifecycle -- Container lifecycle hooks for the port-splitter sidecar.
    ## On Kubernetes < 1.29 the native `sleep` preStop handler is automatically
    ## rendered as an `exec` ["sleep", "<seconds>"] handler instead.
    lifecycle:
      preStop:
        sleep:
          seconds: 20

image:
  # image.name -- The container image to use of the steadybit platform. May contain a registry prefix (e.g. "docker.steadybit.io/steadybit/platform"), in which case global.image.registry is ignored.
  name: steadybit/platform
  # image.tag -- Tag name of the platform container image to use.
  tag: null
  # image.pullPolicy -- Specifies when to pull the image container.
  pullPolicy: Always
  # image.registry -- Credentials used to generate the image pull secret (url/user/password). Not a registry prefix; use global.image.registry for that.
  registry: {}
  pullSecrets: []

serviceAccount:
  # serviceAccount.create -- Specifies whether a ServiceAccount should be created.
  create: true
  # serviceAccount.name -- The name of the ServiceAccount to use.
  # If not set and `create` is true, a name is generated using the fullname template.
  name: null
  # serviceAccount.annotations.* -- Annotations for the service account
  annotations: {}

# podAnnotations -- Additional annotations to be added to the platform pod.
podAnnotations: {}

# -- Ingress configuration properties
ingress:
  # ingress.enabled -- Set to true to create an ingress. Defaults to false on openshift, true otherwise.
  enabled: null
  annotations: {}
  hosts: []
  # - platform.steadybit.local

# -- HTTPRoute configuration properties for Gateway API
httpRoute:
  # httpRoute.enabled -- Set to true to create HTTPRoute resources (Gateway API).
  enabled: false
  # httpRoute.annotations -- Annotations applied to both HTTPRoute resources. Can be overridden per route.
  annotations: {}
  # httpRoute.parentRefs -- Default Gateway references for both HTTPRoute resources. Can be overridden per route. See https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.ParentReference
  parentRefs: []
  # - name: my-gateway
  #   namespace: gateway-ns
  # httpRoute.hostnames -- Default hostnames for both HTTPRoute resources. Can be overridden per route. See https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.Hostname
  hostnames: []
  # - platform.steadybit.local
  # httpRoute.ws -- Per-route overrides for the WebSocket HTTPRoute (agent traffic). Falls back to shared values above when not set.
  ws:
    parentRefs: []
    hostnames: []
    annotations: {}
    # httpRoute.ws.targetGroupAttributes -- ALB target group attributes for the WebSocket (agent) route's target group,
    # emitted as a per-route routeConfigurations entry on the TargetGroupConfiguration and merged over
    # httpRoute.targetGroupAttributes (keys set here win; other default keys still apply). Use this to give the agent
    # channel duration-based (lb_cookie) stickiness independently of the UI: the agent channel never sets a SESSION
    # cookie, so the shared app_cookie stickiness is inert for it, and RSocket session resume needs reconnects to land
    # on the same pod.
    targetGroupAttributes: []
    # - key: stickiness.enabled
    #   value: "true"
    # - key: stickiness.type
    #   value: lb_cookie
    # - key: stickiness.lb_cookie.duration_seconds
    #   value: "3600"
  # httpRoute.ui -- Per-route overrides for the UI HTTPRoute (user traffic). Falls back to shared values above when not set.
  ui:
    parentRefs: []
    hostnames: []
    annotations: {}
  # httpRoute.httpRedirect -- Creates an HTTPRoute that redirects HTTP to HTTPS (301). Requires a Gateway listener on HTTP.
  # When enabling, use the dedicated-listener pattern: scope ws/ui parentRefs to the HTTPS listener via `sectionName: https`,
  # and scope this redirect to the HTTP listener via `sectionName: http`. Otherwise the ws/ui routes will also bind to the HTTP
  # listener and produce duplicate rules that compete with the redirect (Gateway API spec orders by match specificity, and the
  # catch-all redirect is the least specific — it will lose to any ws/ui rule on the same listener).
  httpRedirect:
    # httpRoute.httpRedirect.enabled -- Set to true to create the HTTP-to-HTTPS redirect HTTPRoute.
    enabled: false
    # httpRoute.httpRedirect.parentRefs -- Gateway references for the redirect route. Should target the HTTP listener via sectionName.
    parentRefs: []
    # - name: my-gateway
    #   namespace: gateway-ns
    #   sectionName: http
  # httpRoute.targetGroupAttributes -- ALB target group attributes (key/value pairs) applied to the platform service's target groups via TargetGroupConfiguration. Use to configure stickiness, deregistration delay, etc. See https://docs.aws.amazon.com/elasticloadbalancing/latest/application/load-balancer-target-groups.html#target-group-attributes
  targetGroupAttributes: []
  # - key: stickiness.enabled
  #   value: "true"
  # - key: stickiness.type
  #   value: app_cookie
  # - key: stickiness.app_cookie.cookie_name
  #   value: SESSION
  # - key: deregistration_delay.timeout_seconds
  #   value: "3600"

# -- Route configuration properties for openshift
route:
  # route.enabled -- Set to true to create a route (OpenShift). Defaults to true on openshift, false otherwise.
  enabled: null
  annotations: {}
  host: null
  subdomain: null
  tls:
    insecureEdgeTerminationPolicy: Redirect
    termination: edge

# -- Service configuration properties
service:
  type: null
  annotations: {}

# nodeSelector -- Node labels for pod assignment
nodeSelector: {}

# tolerations -- Tolerations to influence platform pod assignment.
tolerations: []

# topologySpreadConstraints -- Spread constraints to influence platform pod assignment.
# https://kubernetes.io/docs/concepts/workloads/pods/pod-topology-spread-constraints/
topologySpreadConstraints: []

# affinity -- Affinities to influence platform pod assignment.
affinity: {}


resources:
  requests:
    # resources.requests.memory -- The minimal amount of memory needed
    memory: "2Gi"
    # resources.requests.cpu -- The minimal amount of cpu shares needed
    cpu: "2000m"
  limits:
    # resources.limits.memory -- The limit of memory to be used
    memory: "4Gi"
    # resources.limits.cpu -- The limit of cpu share to be used during its interval
    cpu: "4000m"

# -----------------------------------------------------------------------------
# Postgres sub-chart parameters
# -----------------------------------------------------------------------------

# PostgreSQL chart documentation:
# https://github.com/bitnami/charts/blob/master/bitnami/postgresql/README.md

postgresql:
  enabled: true
  auth:
    username: steadybit
    database: steadybit
  global:
    security:
      allowInsecureImages: true
  image:
    repository: bitnamilegacy/postgresql
    tag: 15
  service:
    ports:
      postgresql: "5432"
  primary:
    initdb:
      scripts:
        superuser.sh: |
          #!/bin/sh
          export PGPASSWORD=$POSTGRES_POSTGRES_PASSWORD
          psql -U postgres -c "ALTER USER $POSTGRES_USER WITH SUPERUSER;"
